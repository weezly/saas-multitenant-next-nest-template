  #     context: ./apps/service
  #     dockerfile: Dockerfile
  #   container_name: saas-service
  #   environment:
  #     NODE_ENV: development
  #     PORT: 3001
  #     DATABASE_URL: postgresql://${DB_USER:-saas_user}:${DB_PASSWORD:-saas_password}@postgres:5432/${DB_NAME:-saas_db}
  #     CORS_ORIGIN: http://localhost:3000
  #     JWT_SECRET: ${JWT_SECRET:-your-secret-key-min-32-characters-change-this-in-production}
  #     JWT_EXPIRES_IN: 7d
  #     FRONTEND_URL: http://localhost:3000
  #   ports:
  #     - "3001:3001"
