  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./apps/service/src:/app/src
  #   networks:
  #     - saas-network
  #   restart: unless-stopped

  # Next.js Frontend (optional - uncomment to run in container)
  # app:
  #   build:
  #     context: ./apps/app
  #     dockerfile: Dockerfile
  #   container_name: saas-app
  #   environment:
  #     NODE_ENV: development
  #     NEXT_PUBLIC_API_URL: http://localhost:3001
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - service
  #   volumes:
  #     - ./apps/app/src:/app/src
  #   networks:
  #     - saas-network
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  saas-network:
    driver: bridge
